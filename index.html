<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomía de una suspensión</title>
    <style>
        body { 
            background: #0d0c12; 
            color: #d8cba9; 
            font-family: 'Georgia', serif; 
            padding: 40px 20px; 
            text-align: center;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        
        h2 { 
            font-weight: 300; 
            font-style: italic;
            color: #d4a373; 
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        .bajada {
            color: #729880; 
            font-size: 0.9rem;
            font-style: italic;
            margin-bottom: 50px;
            opacity: 0.8;
            padding: 0 15px;
        }

        .control { 
            margin-bottom: 55px; 
        }

        label {
            font-size: 1rem;
            color: #eae5d9;
            display: block;
            margin-bottom: 15px;
        }

        input[type=range] { 
            -webkit-appearance: none;
            width: 85%; 
            max-width: 320px; 
            background: rgba(114, 152, 128, 0.2);
            height: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #d4a373; 
            cursor: pointer;
            box-shadow: 0 0 8px rgba(212, 163, 115, 0.6);
        }

        .metaforas {
            display: flex;
            justify-content: space-between;
            width: 85%;
            max-width: 320px;
            margin: 8px auto 0 auto;
            font-size: 0.75rem;
            color: #8c8270;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h2>Anatomía de una suspensión</h2>
    <div class="bajada">¿Cómo se siente habitar un cuerpo que flota? Intervení el archivo de la danza.</div>

    <div class="control">
        <label>¿Cómo percibís tu propio peso hoy?</label>
        <input type="range" id="tamanio" min="1" max="10" value="4" oninput="enviarDatos()">
        <div class="metaforas">
            <span>Sólido y compacto</span>
            <span>Leve e ingrávido</span>
        </div>
    </div>

    <div class="control">
        <label>¿A qué velocidad cae un recuerdo?</label>
        <input type="range" id="velocidad" min="1" max="10" value="5" oninput="enviarDatos()">
        <div class="metaforas">
            <span>Un abismo rápido</span>
            <span>Una caída pausada</span>
        </div>
    </div>

    <div class="control">
        <label>¿Qué tan cerca querés estar de esta danza?</label>
        <input type="range" id="filtro" min="1" max="10" value="5" step="0.5" oninput="enviarDatos()">
        <div class="metaforas">
            <span>Mimetizarse en el fondo</span>
            <span>Aproximarse al detalle</span>
        </div>
    </div>

    <div class="control">
        <label>¿Cuál es la textura de tu entorno?</label>
        <input type="range" id="rotacion" min="1" max="10" value="1" step="1" oninput="enviarDatos()">
        <div class="metaforas">
            <span>Tierra y Hueso</span>
            <span>Verde Té</span>
            <span>Violeta Penumbra</span>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://final-labo-1-default-rtdb.firebaseio.com/interaccion.json";
        let timeoutEnvio;

        function enviarDatos() {
            // Usamos un debounce muy corto para no saturar Firebase al arrastrar
            clearTimeout(timeoutEnvio);
            timeoutEnvio = setTimeout(() => {
                let datos = {
                    tamanioCuadricula: Number(document.getElementById('tamanio').value),
                    velAnimacion: Number(document.getElementById('velocidad').value),
                    opacidadFiltro: Number(document.getElementById('filtro').value),
                    rotacionImagen: Number(document.getElementById('rotacion').value),
                    timestamp: Date.now() // <--- ESTO ES CLAVE: envía la señal de interacción real
                };

                fetch(FIREBASE_URL, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(datos)
                });
            }, 50); // 50ms de delay de envío
        }
    </script>
</body>
</html>
