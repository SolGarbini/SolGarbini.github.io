<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preservar la Inocencia - Interacción</title>
    <style>
        body { background: #101020; color: white; font-family: sans-serif; padding: 30px; text-align: center; }
        .control { margin-bottom: 40px; }
        input[type=range] { width: 80%; max-width: 300px; height: 15px; }
        h2 { font-weight: 300; color: #6ab4e1; }
    </style>
</head>
<body>
    <h2>Altera el Entorno</h2>
    <p>Modifica la realidad para proteger el juego de la niña.</p>
    <br>

    <div class="control">
        <label>Mirada Adulta (Fragmentación)</label><br><br>
        <input type="range" id="mirada" min="1" max="15" value="5" oninput="enviarDatos()">
    </div>

    <div class="control">
        <label>Ritmo del Tiempo Exterior</label><br><br>
        <input type="range" id="ritmo" min="2" max="60" value="10" oninput="enviarDatos()">
    </div>

    <div class="control">
        <label>Fuerza del Imaginario (Niña)</label><br><br>
        <input type="range" id="imaginario" min="1" max="8" value="3" step="0.5" oninput="enviarDatos()">
    </div>

    <script>
        // PEGA AQUÍ TU URL DE FIREBASE TERMINADA EN /interaccion.json
        const FIREBASE_URL = "https://final-labo-1-default-rtdb.firebaseio.com/interaccion.json";

        function enviarDatos() {
            let datos = {
                miradaAdulta: Number(document.getElementById('mirada').value),
                ritmoDelJuego: Number(document.getElementById('ritmo').value),
                fuerzaImaginario: Number(document.getElementById('imaginario').value)
            };

            // Enviamos los datos al pizarrón de internet usando el método PUT (reemplazar)
            fetch(FIREBASE_URL, {
                method: "PUT",
                body: JSON.stringify(datos)
            });
        }
    </script>
</body>
</html>
