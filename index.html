<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora de Cuerpos Suspendidos</title>
    <style>
        body { 
            background: #140f1e; /* Violeta denso base de tu paleta */
            color: #d0d074; /* Amarillo manteca naíf vintage */
            font-family: 'Georgia', serif; 
            padding: 40px 20px; 
            text-align: center;
            letter-spacing: 1px;
        }
        
        h2 { 
            font-weight: 300; 
            font-style: italic;
            color: #ff6afa; /* Lila encendido */
            text-shadow: 0 0 10px rgba(255, 106, 250, 0.4);
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .bajada {
            color: #729880; /* Verde pálido de las bolsas */
            font-size: 0.9rem;
            font-style: italic;
            margin-bottom: 50px;
            opacity: 0.9;
            padding: 0 10px;
            line-height: 1.4;
        }

        .control { 
            margin-bottom: 55px; 
            position: relative;
        }

        label {
            font-size: 1.05rem;
            color: #f9f5e0;
            display: block;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px #000;
        }

        input[type=range] { 
            -webkit-appearance: none;
            width: 85%; 
            max-width: 320px; 
            background: rgba(114, 152, 128, 0.3);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #a6690e; /* Ocre/Oro de la paleta */
            cursor: pointer;
            box-shadow: 0 0 8px #a6690e, 0 0 15px #ff6afa;
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.3);
        }

        .metaforas {
            display: flex;
            justify-content: space-between;
            width: 85%;
            max-width: 320px;
            margin: 8px auto 0 auto;
            font-size: 0.75rem;
            color: #729880;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h2>Un registro de cuerpos suspendidos</h2>
    <div class="bajada">¿Cuánto pesan los brazos cuando decidimos no tocar la tierra? Intervení la marea de la danza.</div>

    <div class="control">
        <label>La densidad del espacio</label>
        <input type="range" id="mirada" min="1" max="10" value="5" oninput="enviarDatos()">
        <div class="metaforas">
            <span>Cuerpo entero</span>
            <span>Fragmentos</span>
        </div>
    </div>

    <div class="control">
        <label>La cadencia de la caída</label>
        <input type="range" id="ritmo" min="2" max="25" value="10" oninput="enviarDatos()">
        <div class="metaforas">
            <span>Vértigo</span>
            <span>Suspensión</span>
        </div>
    </div>

    <div class="control">
        <label>La maduración de la paleta</label>
        <input type="range" id="imaginario" min="1" max="10" value="3" step="0.5" oninput="enviarDatos()">
        <div class="metaforas">
            <span>Tono Original</span>
            <span>Atardecer Saturado</span>
        </div>
    </div>

    <div class="control">
        <label>El eje del equilibrio</label>
        <input type="range" id="rotacion" min="0" max="10" value="0" step="0.1" oninput="enviarDatos()">
        <div class="metaforas">
            <span>Raíces quietas</span>
            <span>Giro onírico</span>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://final-labo-1-default-rtdb.firebaseio.com/interaccion.json";

        function enviarDatos() {
            let datos = {
                tamanioCuadricula: Number(document.getElementById('mirada').value),
                velAnimacion: Number(document.getElementById('ritmo').value),
                opacidadFiltro: Number(document.getElementById('imaginario').value),
                rotacionImagen: Number(document.getElementById('rotacion').value)
            };

            fetch(FIREBASE_URL, {
                method: "PUT",
                body: JSON.stringify(datos)
            });
        }
    </script>
</body>
</html>
